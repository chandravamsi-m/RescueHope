<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foster Animals | RescueHope</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#f57c00',
              hover: '#e65100',
              light: '#fff3e0',
            },
            secondary: {
              DEFAULT: '#2e7d32',
              hover: '#1b5e20',
              light: '#e8f5e9',
            },
            accent: {
              DEFAULT: '#0288d1',
              hover: '#01579b',
            },
            neutral: {
              50: '#ffffff',
              100: '#f8f9fa',
              200: '#e9ecef',
              300: '#dee2e6',
              400: '#ced4da',
              500: '#adb5bd',
              600: '#6c757d',
              700: '#495057',
              800: '#343a40',
              900: '#212529',
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          spacing: {
            '18': '4.5rem',
            '22': '5.5rem',
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>

<body class="bg-neutral-100">

  <div class="min-h-screen bg-neutral-100 flex flex-col lg:flex-row font-normal">
    <div id="dashboard-sidebar-placeholder" class="lg:w-64 shrink-0 bg-neutral-900"></div>
    <div class="flex-grow flex flex-col">
      <div id="dashboard-header-placeholder"
        class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-neutral-200"></div>

      <main class="p-6 md:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
          <!-- Foster List -->
          <div class="lg:col-span-1">
            <h4 class="text-xl font-bold mb-8 italic">Animals in <span
                class="text-primary italic opacity-80 not-italic">Your Care</span></h4>
            <div class="flex flex-col gap-4">
              <div
                class="flex items-center gap-6 p-6 bg-white rounded-3xl border-2 border-primary shadow-xl shadow-primary/5 transition-all">
                <img src="../assets/images/img_002.jpg"
                  class="w-20 h-20 rounded-2xl object-cover shrink-0" alt="Luna">
                <div class="flex-grow">
                  <h4 class="text-xl font-bold italic mb-1">Luna</h4>
                  <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-widest mb-3">Siamese • Since Jan
                    12</p>
                  <span
                    class="inline-block bg-secondary text-white text-[10px] font-bold px-4 py-1.5 rounded-full italic tracking-wider">ACTIVE</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Medical Timeline -->
          <div
            class="lg:col-span-2 bg-white p-8 md:p-10 rounded-[2.5rem] border border-neutral-100 shadow-xl shadow-neutral-200/50">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
              <h4 class="text-xl font-bold italic">Medical <span
                  class="text-primary italic opacity-80 not-italic">Timeline</span>: Luna</h4>
              <button
                class="bg-primary text-white px-8 py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-primary-hover shadow-lg shadow-primary/10 transition-all hover:-translate-y-1 block">+
                Log Record</button>
            </div>

            <div
              class="relative pl-10 before:absolute before:left-3 before:top-2 before:bottom-2 before:w-0.5 before:bg-neutral-100">
              <div class="relative mb-12">
                <div
                  class="absolute -left-10 top-1.5 w-6 h-6 rounded-full bg-secondary border-4 border-white shadow-lg ring-2 ring-secondary/20 transition-all">
                </div>
                <div>
                  <p class="text-[10px] font-bold text-neutral-400 capitalize mb-2">March 09, 2026 (Today)</p>
                  <h5 class="text-lg font-bold italic mb-3">Routine Checkup & Vaccination</h5>
                  <p class="text-neutral-500 font-normal leading-relaxed">Rabies booster administered. Luna showed no
                    signs of stress. Weight: 8.5lbs.</p>
                </div>
              </div>
              <div class="relative">
                <div
                  class="absolute -left-10 top-1.5 w-6 h-6 rounded-full bg-neutral-200 border-4 border-white shadow-md transition-all group-hover:bg-secondary">
                </div>
                <div>
                  <p class="text-[10px] font-bold text-neutral-400 capitalize mb-2">Feb 15, 2026</p>
                  <h5 class="text-lg font-bold italic mb-3 text-neutral-900">Flea & Tick Prevention</h5>
                  <p class="text-neutral-500 font-normal leading-relaxed">Monthly dosage applied. No adverse reaction.
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>

</html>
