<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RescueHope</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Theme Initialization (Anti-Flicker) -->
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#f57c00',
              hover: '#e65100',
              light: '#fff3e0',
            },
            secondary: {
              DEFAULT: '#2e7d32',
              hover: '#1b5e20',
              light: '#e8f5e9',
            },
            accent: {
              DEFAULT: '#0288d1',
              hover: '#01579b',
            },
            neutral: {
              50: '#ffffff',
              100: '#f8f9fa',
              200: '#e9ecef',
              300: '#dee2e6',
              400: '#ced4da',
              500: '#adb5bd',
              600: '#6c757d',
              700: '#495057',
              800: '#343a40',
              900: '#212529',
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
            '4xl': '2rem',
          }
        }
      }
    }
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">

  <!-- Icons -->
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>

  <div class="grid grid-cols-1 lg:grid-cols-2 h-screen overflow-hidden">
    <!-- Left Side: Image -->
    <div class="hidden lg:flex relative items-center justify-center overflow-hidden">
      <div class="absolute inset-0 bg-cover bg-center transition-transform duration-[10s] hover:scale-110"
        style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('../assets/images/img_006.jpg');"></div>
      <div class="relative z-10 p-12 text-white max-w-xl">
        <h1 class="text-5xl font-bold mb-6">Welcome Back!</h1>
        <p class="text-xl text-white/80 leading-relaxed">Log in to manage your shifts, update foster records, and track your impact in our rescue community.</p>
      </div>
    </div>

    <!-- Right Side: Form -->
    <div class="flex items-center justify-center p-6 md:p-10 lg:p-12 bg-white dark:bg-neutral-900 border-l border-neutral-100 dark:border-white/5 overflow-y-auto lg:overflow-hidden">
      <div class="w-full max-w-md">
        <div class="text-center mb-6">
          <a href="../index.html" class="inline-flex items-center gap-2 text-2xl font-black text-neutral-900 dark:text-white mb-1 tracking-tight">
            <span class="iconify text-primary" data-icon="ph:paw-print-fill"></span>
            RescueHope
          </a>
          <p class="text-neutral-500 dark:text-neutral-400 text-xs">Enter your credentials to access the portal.</p>
        </div>

        <form>
          <div class="mb-4">
            <label class="block text-xs font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1.5 ml-1">Email Address</label>
            <input type="email" placeholder="name@example.com" class="w-full px-5 py-3 bg-neutral-50 dark:bg-white/5 border border-neutral-200 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary dark:text-white outline-none transition-all text-sm" required>
          </div>
          <div class="mb-4">
            <label class="block text-xs font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1.5 ml-1">Password</label>
            <div class="relative">
              <input id="password-field" type="password" placeholder="••••••••" class="w-full px-5 py-3 bg-neutral-50 dark:bg-white/5 border border-neutral-200 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary dark:text-white outline-none transition-all text-sm pr-12" required>
              <button type="button" id="password-toggle" class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-primary transition-colors">
                <span id="toggle-icon" class="iconify" data-icon="ph:eye-bold"></span>
              </button>
            </div>
          </div>
          <div class="flex items-center justify-between mb-6 ml-1">
            <div class="flex items-center gap-3">
              <input type="checkbox" id="remember" class="w-3.5 h-3.5 rounded border-neutral-300 dark:border-white/20 text-primary focus:ring-primary bg-transparent text-sm">
              <label for="remember" class="text-xs text-neutral-500 dark:text-neutral-400 font-medium">Remember me</label>
            </div>
            <a href="forgot-password.html" class="text-primary text-[10px] font-bold uppercase tracking-wider">Forgot Password?</a>
          </div>
          <a href="../pages/user-dashboard.html" class="block w-full py-3 bg-primary text-white text-center text-xs font-bold uppercase tracking-widest rounded-2xl hover:bg-primary-hover transition-all mb-4">Sign In</a>

          <div class="relative my-5">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-neutral-100 dark:border-white/5"></div>
            </div>
            <div class="relative flex justify-center text-[10px] uppercase tracking-widest font-bold">
              <span class="bg-white dark:bg-neutral-900 px-4 text-neutral-400">Continue with</span>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-2">
            <button class="w-full py-2.5 border-2 border-neutral-100 dark:border-white/10 text-neutral-900 dark:text-white text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:border-neutral-900 dark:hover:border-white transition-all flex items-center justify-center gap-3 group">
              <span class="iconify text-base group-hover:scale-110 transition-transform" data-icon="logos:google-icon"></span>
              Google
            </button>
            <button class="w-full py-2.5 border-2 border-neutral-100 dark:border-white/10 text-neutral-900 dark:text-white text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:border-neutral-900 dark:hover:border-white transition-all flex items-center justify-center gap-3 group">
              <span class="iconify text-base group-hover:scale-110 transition-transform dark:invert" data-icon="logos:apple"></span>
              Apple
            </button>
            <button class="w-full py-2.5 border-2 border-neutral-100 dark:border-white/10 text-neutral-900 dark:text-white text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:border-neutral-900 dark:hover:border-white transition-all flex items-center justify-center gap-3 group">
              <span class="iconify text-base group-hover:scale-110 transition-transform" data-icon="logos:facebook"></span>
              Facebook
            </button>
          </div>
        </form>

        <p class="text-center text-neutral-500 dark:text-neutral-400 mt-8 text-xs">
          Don't have an account? <a href="register.html" class="text-primary font-bold">Sign up as a Volunteer</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('password-toggle').addEventListener('click', function() {
      const passwordField = document.getElementById('password-field');
      const toggleIcon = document.getElementById('toggle-icon');
      
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleIcon.setAttribute('data-icon', 'ph:eye-slash-bold');
      } else {
        passwordField.type = 'password';
        toggleIcon.setAttribute('data-icon', 'ph:eye-bold');
      }
    });
  </script>
</body>

</html>
