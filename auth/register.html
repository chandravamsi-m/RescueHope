<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration | RescueHope</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../assets/images/favicon.webp">

  <!-- Local Fonts -->
  <link rel="stylesheet" href="../assets/fonts/fonts.css">

  <!-- Theme Initialization (Anti-Flicker) -->
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#f57c00',
              hover: '#e65100',
              light: '#fff3e0',
            },
            secondary: {
              DEFAULT: '#ff9800',
              hover: '#f57c00',
              light: '#fff3e0',
            },
            accent: {
              DEFAULT: '#ffb74d',
              hover: '#ffa726',
            },
            neutral: {
              50: '#ffffff',
              100: '#f8f9fa',
              200: '#e9ecef',
              300: '#dee2e6',
              400: '#ced4da',
              500: '#adb5bd',
              600: '#6c757d',
              700: '#495057',
              800: '#343a40',
              900: '#212529',
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
            '4xl': '2rem',
          }
        }
      }
    }
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">

  <!-- Icons -->
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <!-- SEO & Open Graph Tags -->
  <link rel="canonical" href="https://rescuehope.org/auth/register.html">
  <meta property="og:title" content="Registration | RescueHope">
  <meta property="og:description" content="Create an account to join our volunteer rescue network.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rescuehope.org/auth/register.html">
  <meta property="og:image" content="https://rescuehope.org/assets/images/og-image.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Registration | RescueHope">
  <meta name="twitter:description" content="Create an account to join our volunteer rescue network.">
  <meta name="twitter:image" content="https://rescuehope.org/assets/images/og-image.webp">
  
  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Registration",
    "url": "https://rescuehope.org/auth/register.html"
  }
  </script>
</head>

  <div class="grid grid-cols-1 lg:grid-cols-2 h-screen overflow-hidden">
    <!-- Right Side: Image -->
    <div class="hidden lg:flex relative items-center justify-center overflow-hidden order-2">
      <div class="absolute inset-0 bg-cover bg-center transition-transform duration-[10s] hover:scale-110"
        style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('../assets/images/img_007.webp');"></div>
      <div class="relative z-10 p-12 text-white max-w-xl">
        <h1 class="text-5xl font-bold mb-6">Start a <span class="text-primary">Journey</span></h1>
        <p class="text-xl text-white/80 leading-relaxed">By joining our rescue network, you're becoming a vital part of a community that saves lives every day.</p>
      </div>
    </div>

    <!-- Left Side: Form -->
    <div class="flex items-center justify-center p-6 md:p-8 lg:p-10 bg-white dark:bg-neutral-900 order-1 border-r border-neutral-100 dark:border-white/5 overflow-y-auto lg:overflow-hidden relative">
      <div class="w-full max-w-lg my-auto">
        <div class="flex items-start justify-between mb-8 gap-4">
          <div class="flex flex-col">
            <a href="../index.html" class="inline-flex items-center gap-2 text-3xl font-black text-primary mb-1 tracking-tight">
              <span class="iconify text-primary text-3xl" data-icon="ph:paw-print-fill"></span>
              RescueHope
            </a>
            <p class="text-neutral-500 dark:text-neutral-400 text-xs">Create your volunteer account.</p>
          </div>
          
          <div class="flex items-center gap-2 shrink-0 sm:gap-4">
            <button
              class="rtl-toggle flex items-center bg-neutral-100 dark:bg-white/5 rounded-full p-0.5 border border-neutral-200 dark:border-white/10 transition-all hover:bg-neutral-200 dark:hover:bg-white/10"
              aria-label="Toggle direction">
              <span class="rtl-toggle__label ltr px-1.5 py-0.5 text-[9px] font-bold uppercase tracking-wider rounded-full transition-all text-neutral-500 dark:text-white/50">LTR</span>
              <span class="rtl-toggle__label rtl px-1.5 py-0.5 text-[9px] font-bold uppercase tracking-wider rounded-full transition-all text-neutral-500 dark:text-white/50">RTL</span>
            </button>
            <button
              class="theme-toggle w-9 h-9 rounded-full flex items-center justify-center text-neutral-600 bg-neutral-100 dark:bg-white/5 border border-neutral-200 dark:border-white/10 hover:bg-neutral-200 dark:hover:bg-white/10 transition-colors"
              aria-label="Toggle theme">
              <span class="iconify ph-moon-stars-bold text-lg" data-icon="ph:moon-stars-bold"></span>
              <span class="iconify ph-sun-bold text-lg" data-icon="ph:sun-bold"></span>
            </button>
          </div>
        </div>

        <form>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1 ml-1">First Name</label>
              <input type="text" placeholder="Jane" class="w-full px-4 py-2 bg-neutral-50 dark:bg-white/5 border border-neutral-200 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary dark:text-white outline-none transition-all text-sm">
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1 ml-1">Last Name</label>
              <input type="text" placeholder="Doe" class="w-full px-4 py-2 bg-neutral-50 dark:bg-white/5 border border-neutral-200 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary dark:text-white outline-none transition-all text-sm">
            </div>
          </div>
          <div class="mb-3">
            <label class="block text-[10px] font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1 ml-1">Email Address</label>
            <input type="email" placeholder="jane@example.com" class="w-full px-4 py-2 bg-neutral-50 dark:bg-white/5 border border-neutral-200 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary dark:text-white outline-none transition-all text-sm" required>
          </div>
          <div class="mb-3">
            <label class="block text-[10px] font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1 ml-1">Password</label>
            <div class="relative">
              <input id="password-field" type="password" placeholder="••••••••" class="w-full ltr:pr-10 rtl:pl-10 px-4 py-2 bg-neutral-50 dark:bg-white/5 border border-neutral-200 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary dark:text-white outline-none transition-all text-sm" required>
              <button type="button" id="password-toggle" class="absolute ltr:right-3.5 rtl:left-3.5 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-primary transition-colors">
                <span id="toggle-icon" class="iconify" data-icon="ph:eye-bold"></span>
              </button>
            </div>
          </div>
          <div class="mb-5">
            <label class="block text-[10px] font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 mb-1 ml-1">Primary Interest</label>
            <div class="relative">
              <select class="w-full px-4 py-2 bg-neutral-50 dark:bg-white/5 border border-neutral-200 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary dark:text-white outline-none transition-all appearance-none cursor-pointer text-sm">
                <option>General Volunteering</option>
                <option>Foster Program</option>
                <option>Event Help</option>
                <option>Donation Management</option>
              </select>
              <span class="iconify absolute right-5 top-1/2 -translate-y-1/2 text-neutral-400 pointer-events-none text-sm" data-icon="ph:caret-down-bold"></span>
            </div>
          </div>
          <button class="w-full py-3 bg-primary text-white text-xs font-bold uppercase tracking-widest rounded-2xl hover:bg-primary-hover transition-all mb-4">Create Account</button>

          <p class="text-[10px] text-center text-neutral-400 dark:text-neutral-500 leading-relaxed px-4">By registering, you agree to our <a href="../pages/terms.html" class="text-primary hover:underline">Terms</a> and <a href="../pages/privacy.html" class="text-primary hover:underline">Privacy Policy</a>.</p>

          <div class="relative my-5">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-neutral-100 dark:border-white/5"></div>
            </div>
            <div class="relative flex justify-center text-[10px] uppercase tracking-widest font-bold">
              <span class="bg-white dark:bg-neutral-900 px-4 text-neutral-400">Continue with</span>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
            <button class="w-full py-2 border-2 border-neutral-100 dark:border-white/10 text-neutral-900 dark:text-white text-[10px] lg:text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:border-neutral-900 dark:hover:border-white transition-all flex items-center justify-center lg:justify-start lg:px-4 gap-2 group">
              <span class="iconify text-base group-hover:scale-110 transition-transform" data-icon="logos:google-icon"></span>
              <span class="md:hidden lg:inline">Google</span>
            </button>
            <button class="w-full py-2 border-2 border-neutral-100 dark:border-white/10 text-neutral-900 dark:text-white text-[10px] lg:text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:border-neutral-900 dark:hover:border-white transition-all flex items-center justify-center lg:justify-start lg:px-4 gap-2 group">
              <span class="iconify text-base group-hover:scale-110 transition-transform dark:invert" data-icon="logos:apple"></span>
              <span class="md:hidden lg:inline">Apple</span>
            </button>
            <button class="w-full py-2 border-2 border-neutral-100 dark:border-white/10 text-neutral-900 dark:text-white text-[10px] lg:text-[10px] font-bold uppercase tracking-widest rounded-2xl hover:border-neutral-900 dark:hover:border-white transition-all flex items-center justify-center lg:justify-start lg:px-4 gap-2 group">
              <span class="iconify text-base group-hover:scale-110 transition-transform" data-icon="logos:facebook"></span>
              <span class="md:hidden lg:inline">Facebook</span>
            </button>
          </div>
        </form>

        <p class="text-center text-neutral-500 dark:text-neutral-400 mt-8 text-xs">
          Already have an account? <a href="login.html" class="text-primary font-bold">Log in here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('password-toggle').addEventListener('click', function() {
      const passwordField = document.getElementById('password-field');
      const toggleIcon = document.getElementById('toggle-icon');
      
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleIcon.setAttribute('data-icon', 'ph:eye-slash-bold');
      } else {
        passwordField.type = 'password';
        toggleIcon.setAttribute('data-icon', 'ph:eye-bold');
      }
    });
  </script>
</body>

</html>
