<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration | RescueHope</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Theme Initialization (Anti-Flicker) -->
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#f57c00',
              hover: '#e65100',
              light: '#fff3e0',
            },
            secondary: {
              DEFAULT: '#2e7d32',
              hover: '#1b5e20',
              light: '#e8f5e9',
            },
            accent: {
              DEFAULT: '#0288d1',
              hover: '#01579b',
            },
            neutral: {
              50: '#ffffff',
              100: '#f8f9fa',
              200: '#e9ecef',
              300: '#dee2e6',
              400: '#ced4da',
              500: '#adb5bd',
              600: '#6c757d',
              700: '#495057',
              800: '#343a40',
              900: '#212529',
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
            '4xl': '2rem',
          }
        }
      }
    }
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">

  <!-- Icons -->
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>

<body class="min-h-screen bg-neutral-100 font-sans">

  <div class="grid grid-cols-1 lg:grid-cols-2 min-h-screen">
    <!-- Right Side: Image -->
    <div class="hidden lg:flex relative items-center justify-center overflow-hidden order-2">
      <div class="absolute inset-0 bg-cover bg-center transition-transform duration-[10s] hover:scale-110"
        style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('../assets/images/img_007.jpg');"></div>
      <div class="relative z-10 p-12 text-white max-w-xl">
        <h1 class="text-5xl font-bold mb-6">Start a <span class="text-primary">Journey</span></h1>
        <p class="text-xl text-white/80 leading-relaxed">By joining our rescue network, you're becoming a vital part of a community that saves lives every day.</p>
      </div>
    </div>

    <!-- Left Side: Form -->
    <div class="flex items-center justify-center p-8 bg-neutral-100 order-1">
      <div class="w-full max-w-lg bg-white p-10 rounded-[2.5rem] shadow-2xl border border-neutral-200/50">
        <div class="text-center mb-10">
          <a href="../index.html" class="inline-flex items-center gap-2 text-2xl font-bold text-neutral-900 mb-2">
            <span class="iconify text-primary" data-icon="ph:paw-print-fill"></span>
            RescueHope
          </a>
          <p class="text-neutral-500 text-sm">Create your volunteer account.</p>
        </div>

        <form>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div>
              <label class="block text-xs font-bold uppercase tracking-widest text-neutral-500 mb-2 ml-1">First Name</label>
              <input type="text" placeholder="Jane" class="w-full px-6 py-4 bg-neutral-50 border border-neutral-200 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-widest text-neutral-500 mb-2 ml-1">Last Name</label>
              <input type="text" placeholder="Doe" class="w-full px-6 py-4 bg-neutral-50 border border-neutral-200 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
            </div>
          </div>
          <div class="mb-6">
            <label class="block text-xs font-bold uppercase tracking-widest text-neutral-500 mb-2 ml-1">Email Address</label>
            <input type="email" placeholder="jane@example.com" class="w-full px-6 py-4 bg-neutral-50 border border-neutral-200 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" required>
          </div>
          <div class="mb-6">
            <label class="block text-xs font-bold uppercase tracking-widest text-neutral-500 mb-2 ml-1">Password</label>
            <input type="password" placeholder="••••••••" class="w-full px-6 py-4 bg-neutral-50 border border-neutral-200 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" required>
          </div>
          <div class="mb-8">
            <label class="block text-xs font-bold uppercase tracking-widest text-neutral-500 mb-2 ml-1">Primary Interest</label>
            <select class="w-full px-6 py-4 bg-neutral-50 border border-neutral-200 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all appearance-none cursor-pointer">
              <option>General Volunteering</option>
              <option>Foster Program</option>
              <option>Event Help</option>
              <option>Donation Management</option>
            </select>
          </div>
          <button class="w-full py-4 bg-primary text-white text-xs font-bold uppercase tracking-widest rounded-2xl hover:bg-primary-hover shadow-lg shadow-primary/20 transition-all mb-6">Create Account</button>

          <p class="text-[10px] text-center text-neutral-400 leading-relaxed px-4">By registering, you agree to our <a href="../pages/terms.html" class="text-primary hover:underline">Terms</a> and <a href="../pages/privacy.html" class="text-primary hover:underline">Privacy Policy</a>.</p>
        </form>

        <p class="text-center text-neutral-500 mt-10 text-xs">
          Already have an account? <a href="login.html" class="text-primary font-bold">Log in here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>

</html>
