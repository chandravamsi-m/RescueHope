<header
  class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-neutral-200 px-6 md:px-10 py-4 flex items-center justify-between">
  <div class="flex items-center gap-6">
    <button
      class="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-neutral-100 text-neutral-900 sidebar-toggle">
      <span class="iconify" data-icon="ph:list-bold"></span>
    </button>
    <h2 class="text-xl font-bold italic tracking-tight" id="dashboard-title">Dashboard</h2>
  </div>

  <div class="flex items-center gap-6">
    <button
      class="theme-toggle w-10 h-10 flex items-center justify-center rounded-xl bg-neutral-100 text-neutral-900 hover:bg-neutral-900 hover:text-white transition-all shadow-sm"
      aria-label="Toggle theme">
      <span class="iconify" data-icon="ph:moon-stars-bold"></span>
    </button>

    <div class="flex items-center gap-4 pl-6 border-l border-neutral-100">
      <div class="hidden md:block text-right">
        <p class="text-xs font-bold text-neutral-900 leading-none mb-1">Alex Johnson</p>
        <span class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest italic opacity-80">Lead
          Volunteer</span>
      </div>
      <div
        class="w-10 h-10 rounded-full bg-primary/10 border-2 border-primary overflow-hidden shadow-lg shadow-primary/10">
        <img src="../../assets/images/img_005.jpg"
          alt="Avatar" class="w-full h-full object-cover">
      </div>
    </div>
  </div>
</header>
