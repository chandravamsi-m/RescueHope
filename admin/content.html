<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Management | Admin | RescueHope</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>

<body style="background: var(--neutral-100);">

  <div class="dashboard-container">
    <div id="dashboard-sidebar-placeholder"></div>
    <div class="dashboard-content flex flex-col">
      <div id="dashboard-header-placeholder"></div>

      <main class="dashboard-main">
        <!-- CMS Tabs -->
        <div class="admin-tabs">
          <button class="admin-tab admin-tab--active">Success Stories</button>
          <button class="admin-tab">Blog Posts</button>
          <button class="admin-tab">Impact Stats</button>
        </div>

        <div class="admin-content-grid">
          <!-- Story Manage Card 1 -->
          <div class="admin-content-card">
            <div class="admin-content-card__img-box">
              <img src="../assets/images/img_003.jpg"
                alt="Bella">
              <span class="admin-content-card__badge" style="background-color: var(--secondary);">PUBLISHED</span>
            </div>
            <div class="admin-content-card__body">
              <h4>The Story of Bella</h4>
              <p class="text-muted fs-xs m-0">Last edited: 2 days ago by Jane</p>
              <div class="layout-flex gap-sm mt-sm">
                <button class="btn btn-outline btn-sm" style="flex: 1;">Edit</button>
                <button class="btn btn-outline btn-icon"
                  style="color: var(--neutral-400); border-color: var(--neutral-200);">
                  <span class="iconify" data-icon="ph:trash-fill"></span>
                </button>
              </div>
            </div>
          </div>

          <!-- Story Manage Card 2 -->
          <div class="admin-content-card">
            <div class="admin-content-card__img-box">
              <img src="../assets/images/img_004.jpg"
                alt="Max">
              <span class="admin-content-card__badge" style="background-color: var(--primary);">DRAFT</span>
            </div>
            <div class="admin-content-card__body">
              <h4>Max's New Beginning</h4>
              <p class="text-muted fs-xs m-0">Last edited: 5 hours ago by Jane</p>
              <div class="layout-flex gap-sm mt-sm">
                <button class="btn btn-outline btn-sm" style="flex: 1;">Edit</button>
                <button class="btn btn-outline btn-icon"
                  style="color: var(--neutral-400); border-color: var(--neutral-200);">
                  <span class="iconify" data-icon="ph:trash-fill"></span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>

</html>
