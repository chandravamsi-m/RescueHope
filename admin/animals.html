<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Management | Admin | RescueHope</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>

<body style="background: var(--neutral-100);">

  <div class="dashboard-container">
    <div id="dashboard-sidebar-placeholder"></div>
    <div class="dashboard-content flex flex-col">
      <div id="dashboard-header-placeholder"></div>

      <main class="dashboard-main">
        <div class="admin-table-card">
          <!-- Filter bar -->
          <div class="admin-filter-bar">
            <input type="text" placeholder="Search by name, ID, or breed..." class="admin-search-input">
            <div class="layout-flex gap-sm">
              <select class="admin-select">
                <option>Status: All</option>
                <option>Available</option>
                <option>Foster Care</option>
                <option>Adopted</option>
              </select>
              <button class="btn btn-sm btn-outline"><span class="iconify" data-icon="ph:export-fill"></span> Export
                CSV</button>
            </div>
          </div>

          <table class="admin-table">
            <thead>
              <tr>
                <th>Animal</th>
                <th>ID</th>
                <th>Status</th>
                <th>Foster</th>
                <th>Intake Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>
                  <div class="layout-flex items-center gap-sm">
                    <img src="../assets/images/img_001.jpg"
                      class="radius-sm object-cover" style="width: 32px; height: 32px;">
                    <div>
                      <p class="font-bold m-0">Cooper</p>
                      <span class="fs-xs opacity-60">Golden Retriever</span>
                    </div>
                  </div>
                </td>
                <td class="opacity-60">RH-2024-001</td>
                <td><span class="badge badge-secondary">AVAILABLE</span></td>
                <td class="opacity-60">None</td>
                <td class="opacity-60">Jan 15, 2026</td>
                <td><span class="iconify text-muted" data-icon="ph:dots-three-outline-fill"
                    style="cursor: pointer;"></span></td>
              </tr>
              <tr>
                <td>
                  <div class="layout-flex items-center gap-sm">
                    <img
                      src="../assets/images/img_002.jpg"
                      class="radius-sm object-cover" style="width: 32px; height: 32px;">
                    <div>
                      <p class="font-bold m-0">Luna</p>
                      <span class="fs-xs opacity-60">Siamese</span>
                    </div>
                  </div>
                </td>
                <td class="opacity-60">RH-2024-042</td>
                <td><span class="badge badge-primary">FOSTER CARE</span></td>
                <td class="opacity-60">Sarah Miller</td>
                <td class="opacity-60">Jan 10, 2026</td>
                <td><span class="iconify text-muted" data-icon="ph:dots-three-outline-fill"
                    style="cursor: pointer;"></span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>

</html>
