<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | RescueHope Animal Rescue</title>
  <meta name="description"
    content="Have questions? Get in touch with RescueHope. We're here to help with adoptions, volunteering, and more.">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#f57c00',
              hover: '#e65100',
              light: '#fff3e0',
            },
            secondary: {
              DEFAULT: '#2e7d32',
              hover: '#1b5e20',
              light: '#e8f5e9',
            },
            accent: {
              DEFAULT: '#0288d1',
              hover: '#01579b',
            },
            neutral: {
              50: '#ffffff',
              100: '#f8f9fa',
              200: '#e9ecef',
              300: '#dee2e6',
              400: '#ced4da',
              500: '#adb5bd',
              600: '#6c757d',
              700: '#495057',
              800: '#343a40',
              900: '#212529',
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          spacing: {
            '18': '4.5rem',
            '22': '5.5rem',
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>

<body>

  <div id="navbar-placeholder"></div>

  <header class="bg-neutral-900 py-16 text-white">
    <div class="container mx-auto px-4 text-center animate-fade-up">
      <h1 class="text-4xl md:text-5xl font-bold mb-4">Get in <span class="text-primary">Touch</span></h1>
      <p class="mx-auto text-white/60 max-w-2xl text-lg">Whether you're looking to adopt, volunteer, or just have a
        question, our team is ready to help.</p>
    </div>
  </header>

  <main class="py-20">
    <div class="container mx-auto px-4">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
        <!-- Contact Info -->
        <div class="animate-on-scroll">
          <h2 class="text-3xl font-bold mb-12 uppercase tracking-widest text-xs text-neutral-400">Contact <span
              class="text-secondary">Information</span></h2>

          <div class="flex gap-6 mb-10">
            <div
              class="w-14 h-14 rounded-2xl bg-primary/10 flex items-center justify-center shrink-0 text-primary shadow-sm border border-primary/5">
              <span class="iconify text-2xl" data-icon="ph:map-pin-fill"></span>
            </div>
            <div>
              <h4 class="text-lg font-bold mb-1">Our Shelter</h4>
              <p class="text-neutral-500 leading-relaxed">123 Rescue Lane, Silver Spring, MD 20901</p>
            </div>
          </div>

          <div class="flex gap-6 mb-10">
            <div
              class="w-14 h-14 rounded-2xl bg-secondary/10 flex items-center justify-center shrink-0 text-secondary shadow-sm border border-secondary/5">
              <span class="iconify text-2xl" data-icon="ph:phone-fill"></span>
            </div>
            <div>
              <h4 class="text-lg font-bold mb-1">Phone Number</h4>
              <p class="text-neutral-500 leading-relaxed">+1 (555) 123-4567</p>
            </div>
          </div>

          <div class="flex gap-6 mb-12">
            <div
              class="w-14 h-14 rounded-2xl bg-accent/10 flex items-center justify-center shrink-0 text-accent shadow-sm border accent/5">
              <span class="iconify text-2xl" data-icon="ph:envelope-simple-fill"></span>
            </div>
            <div>
              <h4 class="text-lg font-bold mb-1">Email Support</h4>
              <p class="text-neutral-500 leading-relaxed">hello@rescuehope.org</p>
            </div>
          </div>

          <!-- Map -->
          <div class="relative rounded-3xl overflow-hidden aspect-video shadow-2xl group">
            <img src="../assets/images/img_028.jpg"
              alt="Map Placeholder"
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
            <div
              class="absolute inset-0 bg-neutral-900/40 backdrop-blur-[2px] flex flex-col items-center justify-center text-white">
              <span class="iconify text-4xl mb-3" data-icon="ph:map-trifold-fill"></span>
              <p class="font-bold uppercase tracking-widest text-xs">Interactive Map View</p>
            </div>
          </div>
        </div>

        <!-- Contact Form -->
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-neutral-100 animate-on-scroll">
          <h3 class="text-2xl font-bold mb-8 italic">Send us a <span class="text-primary">Message</span></h3>
          <form id="contact-form" class="space-y-6">
            <div class="space-y-2">
              <label for="name" class="block text-xs font-bold uppercase tracking-widest text-neutral-400 ml-1">Full
                Name</label>
              <input type="text" id="name" name="name"
                class="w-full bg-neutral-50 border border-neutral-100 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-primary focus:bg-white transition-all"
                placeholder="Enter your name" required>
            </div>
            <div class="space-y-2">
              <label for="email" class="block text-xs font-bold uppercase tracking-widest text-neutral-400 ml-1">Email
                Address</label>
              <input type="email" id="email" name="email"
                class="w-full bg-neutral-50 border border-neutral-100 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-primary focus:bg-white transition-all"
                placeholder="Enter your email" required>
            </div>
            <div class="space-y-2">
              <label for="subject"
                class="block text-xs font-bold uppercase tracking-widest text-neutral-400 ml-1">Subject</label>
              <div class="relative">
                <select id="subject" name="subject"
                  class="w-full bg-neutral-50 border border-neutral-100 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-primary focus:bg-white transition-all appearance-none cursor-pointer">
                  <option value="general">General Inquiry</option>
                  <option value="adoption">Adoption Question</option>
                  <option value="volunteer">Volunteering</option>
                  <option value="donation">Donation Support</option>
                </select>
                <span class="iconify absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-neutral-400"
                  data-icon="ph:caret-down-bold"></span>
              </div>
            </div>
            <div class="space-y-2">
              <label for="message"
                class="block text-xs font-bold uppercase tracking-widest text-neutral-400 ml-1">Message</label>
              <textarea id="message" name="message"
                class="w-full bg-neutral-50 border border-neutral-100 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-primary focus:bg-white transition-all resize-none"
                rows="5" placeholder="How can we help?" required></textarea>
            </div>
            <button type="submit"
              class="w-full bg-secondary text-white py-5 rounded-2xl font-bold text-xs uppercase tracking-[0.2em] hover:bg-secondary-hover shadow-xl shadow-secondary/20 transition-all hover:-translate-y-0.5 mt-4">Send
              Message</button>
          </form>
          <p id="form-status" class="mt-8 text-center text-sm font-bold animate-pulse hidden"></p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const status = document.getElementById('form-status');
      status.classList.remove('hidden');
      status.classList.add('text-secondary');
      status.innerText = 'Sending your message...';

      // Mock success
      setTimeout(() => {
        status.innerText = 'Thank you! Your message has been sent successfully.';
        this.reset();
      }, 1500);
    });
  </script>
</body>

</html>
