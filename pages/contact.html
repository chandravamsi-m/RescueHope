<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | RescueHope Animal Rescue</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../assets/images/favicon.webp">
  <meta name="description"
    content="Have questions? Get in touch with RescueHope. We're here to help with adoptions, volunteering, and more.">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#f57c00',
              hover: '#e65100',
              light: '#fff3e0',
            },
            secondary: {
              DEFAULT: '#2e7d32',
              hover: '#1b5e20',
              light: '#e8f5e9',
            },
            accent: {
              DEFAULT: '#0288d1',
              hover: '#01579b',
            },
            neutral: {
              50: '#ffffff',
              100: '#f8f9fa',
              200: '#e9ecef',
              300: '#dee2e6',
              400: '#ced4da',
              500: '#adb5bd',
              600: '#6c757d',
              700: '#495057',
              800: '#343a40',
              900: '#212529',
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          spacing: {
            '18': '4.5rem',
            '22': '5.5rem',
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <!-- SEO & Open Graph Tags -->
  <link rel="canonical" href="https://rescuehope.org/pages/contact.html">
  <meta property="og:title" content="Contact Us | RescueHope Animal Rescue">
  <meta property="og:description" content="Get in touch with RescueHope. We're here to answer any questions about our animal rescue services.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rescuehope.org/pages/contact.html">
  <meta property="og:image" content="https://rescuehope.org/assets/images/og-image.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact Us | RescueHope Animal Rescue">
  <meta name="twitter:description" content="Get in touch with RescueHope. We're here to answer any questions about our animal rescue services.">
  <meta name="twitter:image" content="https://rescuehope.org/assets/images/og-image.webp">
  
  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "name": "Contact Us",
    "url": "https://rescuehope.org/pages/contact.html"
  }
  </script>
</head>

<body>

  <div id="navbar-placeholder" class="navbar navbar-transparent"></div>

  <header class="bg-gradient-to-br from-neutral-900 via-neutral-800 to-neutral-900 py-16 md:py-24 text-white relative overflow-hidden">
    <div class="absolute inset-0 bg-[url('../assets/images/grid.svg')] opacity-10"></div>
    <div class="container mx-auto px-4 text-center relative z-10 animate-fade-up">
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-6">Get in <span class="text-primary italic">Touch</span></h1>
      <p class="mx-auto text-white/70 max-w-2xl text-lg md:text-xl leading-relaxed">Whether you're looking to adopt, volunteer, or just have a
        question, our team is ready to help you save lives.</p>
    </div>
  </header>

  <main class="py-12 md:py-20">
    <div class="container mx-auto px-4">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-12 lg:gap-16 items-stretch">
        <div class="bg-white dark:bg-neutral-900 p-6 md:p-12 rounded-3xl md:rounded-[2.5rem] shadow-2xl border border-neutral-100 dark:border-white/5 animate-on-scroll">
          <h3 class="text-2xl md:text-3xl font-bold mb-6 md:mb-8 dark:text-white italic">Send us a <span class="text-primary">Message</span></h3>
          <form id="contact-form" class="space-y-4 md:space-y-6">
            <div class="space-y-1.5 md:space-y-2">
              <label for="name" class="block text-xs font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 ml-1">Full
                Name</label>
              <input type="text" id="name" name="name"
                class="w-full bg-white dark:bg-white/5 border border-neutral-300 dark:border-white/20 rounded-2xl px-6 py-3 md:py-4 text-base dark:text-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
                placeholder="Enter your name" required>
            </div>
            <div class="space-y-1.5 md:space-y-2">
              <label for="email" class="block text-xs font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 ml-1">Email
                Address</label>
              <input type="email" id="email" name="email"
                class="w-full bg-white dark:bg-white/5 border border-neutral-300 dark:border-white/20 rounded-2xl px-6 py-3 md:py-4 text-base dark:text-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
                placeholder="Enter your email" required>
            </div>
            <div class="space-y-1.5 md:space-y-2">
              <label for="subject"
                class="block text-xs font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 ml-1">Subject</label>
              <div class="relative">
                <select id="subject" name="subject"
                  class="w-full bg-white dark:bg-white/5 border border-neutral-300 dark:border-white/20 rounded-2xl px-6 py-3 md:py-4 text-base dark:text-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all appearance-none cursor-pointer">
                  <option value="general">General Inquiry</option>
                  <option value="adoption">Adoption Question</option>
                  <option value="volunteer">Volunteering</option>
                  <option value="donation">Donation Support</option>
                </select>
                <span class="iconify absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-neutral-400"
                  data-icon="ph:caret-down-bold"></span>
              </div>
            </div>
            <div class="space-y-1.5 md:space-y-2">
              <label for="message"
                class="block text-xs font-bold uppercase tracking-widest text-neutral-500 dark:text-neutral-400 ml-1">Message</label>
              <textarea id="message" name="message"
                class="w-full bg-white dark:bg-white/5 border border-neutral-300 dark:border-white/20 rounded-2xl px-6 py-3 md:py-4 text-base dark:text-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all resize-none"
                rows="4" md:rows="5" placeholder="How can we help?" required></textarea>
            </div>
            <button type="submit"
              class="w-full bg-primary text-white py-3.5 md:py-5 rounded-xl md:rounded-2xl font-bold text-sm uppercase tracking-[0.2em] hover:bg-primary-hover transition-all hover:-translate-y-0.5 mt-2 md:mt-4">Send
              Message</button>
          </form>
          <p id="form-status" class="mt-8 text-center text-sm font-bold animate-pulse hidden"></p>
        </div>

        <!-- Contact Info -->
        <div class="animate-on-scroll flex flex-col">
          <h2 class="text-3xl font-bold mb-12 uppercase tracking-widest text-xs text-neutral-400">Contact <span
              class="text-secondary">Information</span></h2>

          <div class="space-y-8">
            <div class="flex gap-6 group hover:-translate-y-1 transition-transform duration-300">
              <div
                class="w-16 h-16 rounded-2xl bg-primary/10 flex items-center justify-center shrink-0 text-primary shadow-sm border border-primary/10 group-hover:bg-primary group-hover:text-white transition-all duration-300">
                <span class="iconify text-3xl" data-icon="ph:map-pin-fill"></span>
              </div>
              <div>
                <h4 class="text-xl font-bold mb-1 dark:text-white">Our Shelter</h4>
                <p class="text-neutral-500 dark:text-neutral-400 leading-relaxed">123 Rescue Lane, Silver Spring, MD 20901</p>
              </div>
            </div>

            <div class="flex gap-6 group hover:-translate-y-1 transition-transform duration-300">
              <div
                class="w-16 h-16 rounded-2xl bg-secondary/10 flex items-center justify-center shrink-0 text-secondary shadow-sm border border-secondary/10 group-hover:bg-secondary group-hover:text-white transition-all duration-300">
                <span class="iconify text-3xl" data-icon="ph:phone-fill"></span>
              </div>
              <div>
                <h4 class="text-xl font-bold mb-1 dark:text-white">Phone Number</h4>
                <p class="text-neutral-500 dark:text-neutral-400 leading-relaxed">+1 (555) 123-4567</p>
              </div>
            </div>

            <div class="flex gap-6 group hover:-translate-y-1 transition-transform duration-300">
              <div
                class="w-16 h-16 rounded-2xl bg-accent/10 flex items-center justify-center shrink-0 text-accent shadow-sm border border-accent/10 group-hover:bg-accent group-hover:text-white transition-all duration-300">
                <span class="iconify text-3xl" data-icon="ph:envelope-simple-fill"></span>
              </div>
              <div>
                <h4 class="text-xl font-bold mb-1 dark:text-white">Email Support</h4>
                <p class="text-neutral-500 dark:text-neutral-400 leading-relaxed">hello@rescuehope.org</p>
              </div>
            </div>
          </div>

          <!-- Map -->
          <div class="relative rounded-3xl overflow-hidden shadow-2xl mt-12 flex-grow min-h-[400px] border border-neutral-100 dark:border-white/5">
            <iframe 
              src="https://maps.google.com/maps?q=123%20Rescue%20Lane,%20Silver%20Spring,%20MD%2020901&t=&z=15&ie=UTF8&iwloc=&output=embed"
              class="w-full h-full border-0 dark:invert-[0.9] dark:hue-rotate-180 transition-all duration-500" 
              allowfullscreen="" 
              loading="lazy" 
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const status = document.getElementById('form-status');
      status.classList.remove('hidden');
      status.classList.add('text-secondary');
      status.innerText = 'Sending your message...';

      // Mock success
      setTimeout(() => {
        status.innerText = 'Thank you! Your message has been sent successfully.';
        this.reset();
      }, 1500);
    });
  </script>
</body>

</html>
