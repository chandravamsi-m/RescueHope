<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adoptable Animals | RescueHope</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#f57c00',
              hover: '#e65100',
              light: '#fff3e0',
            },
            secondary: {
              DEFAULT: '#2e7d32',
              hover: '#1b5e20',
              light: '#e8f5e9',
            },
            accent: {
              DEFAULT: '#0288d1',
              hover: '#01579b',
            },
            neutral: {
              50: '#ffffff',
              100: '#f8f9fa',
              200: '#e9ecef',
              300: '#dee2e6',
              400: '#ced4da',
              500: '#adb5bd',
              600: '#6c757d',
              700: '#495057',
              800: '#343a40',
              900: '#212529',
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          spacing: {
            '18': '4.5rem',
            '22': '5.5rem',
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>

<body>
  <!-- Navbar Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Page Header -->
  <header class="bg-neutral-900 py-20 text-white">
    <div class="container mx-auto px-4">
      <h1 class="text-4xl md:text-5xl font-bold mb-4 text-center">Find Your <span class="text-primary">Perfect
          Match</span></h1>
      <p class="text-center opacity-60 max-w-2xl mx-auto">Browse our lovable residents waiting for their forever homes.
        Every adoption saves a life.</p>
    </div>
  </header>

  <main class="py-16">
    <div class="container mx-auto px-4">
      <!-- Filter Bar -->
      <div class="flex flex-wrap justify-center gap-3 mb-12">
        <button
          class="bg-primary text-white px-6 py-2 rounded-full text-sm font-bold shadow-lg shadow-primary/20 hover:bg-primary-hover transition-colors">All
          Animals</button>
        <button
          class="border border-neutral-200 text-neutral-600 px-6 py-2 rounded-full text-sm font-bold hover:border-primary hover:text-primary transition-all">Dogs</button>
        <button
          class="border border-neutral-200 text-neutral-600 px-6 py-2 rounded-full text-sm font-bold hover:border-primary hover:text-primary transition-all">Cats</button>
        <button
          class="border border-neutral-200 text-neutral-600 px-6 py-2 rounded-full text-sm font-bold hover:border-primary hover:text-primary transition-all">Puppies</button>
        <button
          class="border border-neutral-200 text-neutral-600 px-6 py-2 rounded-full text-sm font-bold hover:border-primary hover:text-primary transition-all">Seniors</button>
        <button
          class="border border-neutral-200 text-neutral-600 px-6 py-2 rounded-full text-sm font-bold hover:border-primary hover:text-primary transition-all">Special
          Needs</button>
      </div>

      <!-- Animals Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Animal Card 1 -->
        <div
          class="bg-white rounded-3xl overflow-hidden border border-neutral-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group animate-fade-up">
          <div class="relative aspect-[4/3] overflow-hidden">
            <img src="../assets/images/img_009.jpg"
              alt="Cooper" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            <span
              class="absolute top-4 left-4 bg-primary text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">DOG</span>
          </div>
          <div class="p-8">
            <h3 class="text-2xl font-bold mb-1">Cooper</h3>
            <p class="text-neutral-500 text-sm mb-4">Golden Retriever • 2 Years • Male</p>
            <div class="flex flex-wrap gap-2 mb-8">
              <span
                class="bg-neutral-50 text-neutral-600 text-[10px] font-bold px-3 py-1 rounded-full border border-neutral-100 uppercase tracking-wider">Friendly</span>
              <span
                class="bg-neutral-50 text-neutral-600 text-[10px] font-bold px-3 py-1 rounded-full border border-neutral-100 uppercase tracking-wider">Active</span>
              <span
                class="bg-neutral-50 text-neutral-600 text-[10px] font-bold px-3 py-1 rounded-full border border-neutral-100 uppercase tracking-wider">Vaccinated</span>
            </div>
            <a href="animal-detail.html"
              class="block w-full text-center bg-primary text-white py-4 rounded-2xl font-bold text-sm hover:bg-primary-hover shadow-lg shadow-primary/10 transition-colors">View
              Profile</a>
          </div>
        </div>

        <!-- Animal Card 2 -->
        <div
          class="bg-white rounded-3xl overflow-hidden border border-neutral-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group animate-fade-up"
          style="transition-delay: 0.1s;">
          <div class="relative aspect-[4/3] overflow-hidden">
            <img src="../assets/images/img_010.jpg"
              alt="Luna" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            <span
              class="absolute top-4 left-4 bg-accent text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">CAT</span>
          </div>
          <div class="p-8">
            <h3 class="text-2xl font-bold mb-1">Luna</h3>
            <p class="text-neutral-500 text-sm mb-4">Siamese • 1 Year • Female</p>
            <div class="flex flex-wrap gap-2 mb-8">
              <span
                class="bg-neutral-50 text-neutral-600 text-[10px] font-bold px-3 py-1 rounded-full border border-neutral-100 uppercase tracking-wider">Quiet</span>
              <span
                class="bg-neutral-50 text-neutral-600 text-[10px] font-bold px-3 py-1 rounded-full border border-neutral-100 uppercase tracking-wider">Indoor</span>
              <span
                class="bg-neutral-50 text-neutral-600 text-[10px] font-bold px-3 py-1 rounded-full border border-neutral-100 uppercase tracking-wider">Spayed</span>
            </div>
            <a href="animal-detail.html"
              class="block w-full text-center bg-primary text-white py-4 rounded-2xl font-bold text-sm hover:bg-primary-hover shadow-lg shadow-primary/10 transition-colors">View
              Profile</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <script src="../assets/js/main.js"></script>
</body>

</html>
