<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | RescueHope</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../assets/images/favicon.webp">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#f57c00',
              hover: '#e65100',
              light: '#fff3e0',
            },
            secondary: {
              DEFAULT: '#2e7d32',
              hover: '#1b5e20',
              light: '#e8f5e9',
            },
            accent: {
              DEFAULT: '#0288d1',
              hover: '#01579b',
            },
            neutral: {
              50: '#ffffff',
              100: '#f8f9fa',
              200: '#e9ecef',
              300: '#dee2e6',
              400: '#ced4da',
              500: '#adb5bd',
              600: '#6c757d',
              700: '#495057',
              800: '#343a40',
              900: '#212529',
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          spacing: {
            '18': '4.5rem',
            '22': '5.5rem',
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <!-- SEO & Open Graph Tags -->
  <link rel="canonical" href="https://rescuehope.org/pages/coming-soon.html">
  <meta property="og:title" content="Coming Soon | RescueHope">
  <meta property="og:description" content="A new experience is coming to RescueHope soon. Stay tuned!">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rescuehope.org/pages/coming-soon.html">
  <meta property="og:image" content="https://rescuehope.org/assets/images/og-image.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Coming Soon | RescueHope">
  <meta name="twitter:description" content="A new experience is coming to RescueHope soon. Stay tuned!">
  <meta name="twitter:image" content="https://rescuehope.org/assets/images/og-image.webp">
  
  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Coming Soon",
    "url": "https://rescuehope.org/pages/coming-soon.html"
  }
  </script>
</head>

<body>

  <main class="min-h-screen flex items-center justify-center p-8 bg-neutral-900 relative overflow-x-hidden">
    <!-- Background elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary/10 blur-[150px] rounded-full -translate-y-1/2 translate-x-1/2"></div>
      <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-secondary/10 blur-[150px] rounded-full translate-y-1/2 -translate-x-1/2"></div>
    </div>

    <div class="max-w-3xl w-full text-center relative z-10 animate-fade-up">
      <a href="../index.html" class="inline-flex items-center gap-3 text-white font-black text-2xl md:text-3xl mb-8 md:mb-12 group tracking-tight">
        <span class="iconify text-primary" data-icon="ph:paw-print-fill"></span>
        RescueHope
      </a>

      <h1 class="text-3xl md:text-6xl font-black text-white mb-6 italic leading-tight tracking-tight">Something <span
          class="text-primary italic opacity-90">Incredible</span> is Coming</h1>
      <p class="text-sm md:text-lg text-neutral-400 font-normal leading-relaxed mb-10 max-w-2xl mx-auto">Our new foster
        management portal and community platform are currently under development. We're building a better way to save
        lives.</p>

      <div class="flex flex-col items-center">
        <form class="w-full max-w-sm flex flex-col sm:flex-row gap-3 mb-10">
          <input type="email" placeholder="Get notified when we launch..."
            class="flex-grow bg-white/5 border border-white/10 rounded-2xl px-6 py-3.5 text-white placeholder:text-white/30 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-normal text-sm">
          <button
            class="bg-primary text-white px-8 py-3.5 rounded-2xl font-bold text-[10px] uppercase tracking-widest hover:bg-primary-hover transition-all hover:-translate-y-1">Notify
            Me</button>
        </form>

        <div class="flex gap-6 sm:gap-10">
          <a href="#" class="text-neutral-500 hover:text-white transition-all hover:scale-125 duration-500">
            <span class="iconify text-xl md:text-2xl" data-icon="ph:facebook-logo"></span>
          </a>
          <a href="#" class="text-neutral-500 hover:text-white transition-all hover:scale-125 duration-500">
            <span class="iconify text-xl md:text-2xl" data-icon="ph:instagram-logo"></span>
          </a>
          <a href="#" class="text-neutral-500 hover:text-white transition-all hover:scale-125 duration-500">
            <span class="iconify text-xl md:text-2xl" data-icon="ph:twitter-logo"></span>
          </a>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/main.js"></script>
</body>

</html>
